name: Harness

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  harness:
    name: Harness report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Syntax check harness scripts
        run: |
          node --check harness-engineering/scripts/harness/check-task-packet.mjs
          node --check harness-engineering/scripts/harness/check-evidence.mjs
          node --check harness-engineering/scripts/harness/check-review.mjs
          node --check harness-engineering/scripts/harness/check-template-health.mjs
          node --check harness-engineering/scripts/harness/check-runtime-evidence.mjs
          node --check harness-engineering/scripts/harness/check-doc-links.mjs
          node --check harness-engineering/scripts/harness/check-doc-inventory.mjs
          node --check harness-engineering/scripts/harness/check-sync-drift.mjs
          node --check harness-engineering/scripts/harness/check-boundaries.mjs
          node --check harness-engineering/scripts/harness/check-backend-response-contract.mjs
          node --check harness-engineering/scripts/harness/check-backend-dto-contract.mjs
          node --check harness-engineering/scripts/harness/check-permission-contract.mjs
          node --check harness-engineering/scripts/harness/check-audit-coverage.mjs
          node --check harness-engineering/scripts/harness/check-visual-evidence.mjs
          node --check harness-engineering/scripts/harness/check-adoption.mjs
          node --check harness-engineering/scripts/harness/check-inheritance-contract.mjs
          node --check harness-engineering/scripts/harness/triage-base-drift.mjs

      - name: Test harness scripts
        run: node --test harness-engineering/scripts/harness/*.test.mjs

      - name: Prepare report directory
        run: mkdir -p harness-engineering/.harness/reports

      - name: Check task packets
        run: |
          node harness-engineering/scripts/harness/check-task-packet.mjs --root harness-engineering
          node harness-engineering/scripts/harness/check-task-packet.mjs --json --root harness-engineering > harness-engineering/.harness/reports/task-packets.json

      - name: Check verification evidence
        run: |
          node harness-engineering/scripts/harness/check-evidence.mjs --strict --root harness-engineering
          node harness-engineering/scripts/harness/check-evidence.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/evidence.json

      - name: Check review artifacts
        run: |
          node harness-engineering/scripts/harness/check-review.mjs --strict --root harness-engineering
          node harness-engineering/scripts/harness/check-review.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/review.json

      - name: Check generic harness governance
        run: |
          node harness-engineering/scripts/harness/check-template-health.mjs --json --root harness-engineering > harness-engineering/.harness/reports/template-health.json
          node harness-engineering/scripts/harness/check-runtime-evidence.mjs --json --root harness-engineering > harness-engineering/.harness/reports/runtime-evidence.json
          node harness-engineering/scripts/harness/check-doc-links.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/doc-links.json
          node harness-engineering/scripts/harness/check-doc-inventory.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/doc-inventory.json
          node harness-engineering/scripts/harness/check-sync-drift.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/sync-drift.json

      - name: Run report-first contract checks
        run: |
          node harness-engineering/scripts/harness/check-boundaries.mjs --json --root harness-engineering > harness-engineering/.harness/reports/boundaries.json
          node harness-engineering/scripts/harness/check-backend-response-contract.mjs --json --root harness-engineering > harness-engineering/.harness/reports/backend-response-contract.json
          node harness-engineering/scripts/harness/check-backend-dto-contract.mjs --json --root harness-engineering > harness-engineering/.harness/reports/backend-dto-contract.json
          node harness-engineering/scripts/harness/check-permission-contract.mjs --json --root harness-engineering > harness-engineering/.harness/reports/permission-contract.json
          node harness-engineering/scripts/harness/check-audit-coverage.mjs --json --root harness-engineering > harness-engineering/.harness/reports/audit-coverage.json
          node harness-engineering/scripts/harness/check-visual-evidence.mjs --json --root harness-engineering > harness-engineering/.harness/reports/visual-evidence.json
          node harness-engineering/scripts/harness/check-adoption.mjs --json --root harness-engineering > harness-engineering/.harness/reports/adoption.json
          node harness-engineering/scripts/harness/check-inheritance-contract.mjs --json --strict --root harness-engineering > harness-engineering/.harness/reports/inheritance-contract.json
          node harness-engineering/scripts/harness/triage-base-drift.mjs --json --root harness-engineering > harness-engineering/.harness/reports/base-drift.json

      - name: Upload harness reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: harness-reports
          path: harness-engineering/.harness/reports/

  visual-evidence-blocking:
    name: Visual Evidence Blocking (Experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Check visual evidence strictly
        run: node harness-engineering/scripts/harness/check-visual-evidence.mjs --strict --root harness-engineering
